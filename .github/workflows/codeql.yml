name: CodeQL

# Static security analysis for the TypeScript/JS codebase. Runs on PRs, pushes to main, and
# weekly to catch newly-published query updates against unchanged code.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Security-extended adds higher-signal security queries beyond the default set.
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
