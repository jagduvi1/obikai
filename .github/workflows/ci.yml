name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # Fail-fast quality gate: types, lint/format, and import boundaries. Anything broken here
  # makes the rest of the pipeline pointless, so this is the first thing to go red.
  quality:
    name: Quality (typecheck · lint · boundaries)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (biome)
        run: pnpm lint

      - name: Import boundaries (eslint-plugin-boundaries)
        run: pnpm boundaries

  # Full test suite, including integration tests that need the external services Obikai
  # consumes as unmodified upstream images (Mongo + Redis).
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MONGO_URL: mongodb://localhost:27017
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # License posture (deny-by-default, ADR-0008) + the independent rank-engine purity guard
  # (ADR-0003/0005). Both are pure Node scripts with no third-party deps.
  license:
    name: License & purity gates
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: License allowlist gate (ADR-0008)
        run: pnpm license:check

      - name: Rank-engine purity guard (ADR-0003/0005)
        run: node scripts/assert-rank-engine-purity.mjs

  # Filesystem vulnerability + misconfiguration scan over the repo (deps + IaC/Dockerfiles).
  security:
    name: Security (trivy fs)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        # SHA-pinned (supply-chain hardening for the security scanner); Dependabot bumps the pin.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  # Verify the shipped images build. We do NOT push from CI — release.yml owns publishing.
  docker:
    name: Docker build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        # api/worker share the node multi-stage Dockerfile (ARG APP); web-admin is a static
        # Caddy-served SPA with its own Dockerfile (which also runs `caddy validate` as a gate).
        include:
          - app: api
            file: ./docker/Dockerfile
            args: APP=api
          - app: worker
            file: ./docker/Dockerfile
            args: APP=worker
          - app: web-admin
            file: ./docker/web-admin.Dockerfile
            args: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          build-args: ${{ matrix.args }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
