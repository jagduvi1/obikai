packages:
  - 'apps/*'
  - 'packages/*'
  - 'adapters/*'

# Pin shared dependency versions in one place (referenced as `catalog:` in package.json).
catalog:
  typescript: ^5.7.2
  zod: ^4.4.3
  vitest: ^4.1.8
  # vitest 4 declares `vite` as a peer; we provide it explicitly (no phantom deps, see .npmrc).
  vite: ^6.4.3
  fast-check: ^4.8.0
  decimal.js: ^10.4.3
  '@js-temporal/polyfill': ^0.5.1
