# ─────────────────────────────────────────────────────────────────────────────
# Obikai — LOCAL DEV override. Auto-merged by `docker compose up` on top of the
# base file (no -f needed locally). Adds source bind mounts, a dev command, and
# exposed host ports for hands-on development.
#
# The `local` profile (opt-in: `docker compose --profile local up`) brings up the
# bundled S3 (MinIO) and SMTP (Mailpit) sandboxes so a developer needs zero
# external accounts — the honest "minimum self-host footprint" from ADR-0009
# (app + Mongo + Redis + an S3 endpoint + an SMTP endpoint), all local.
#
# NOTE: bind-mounting the repo over /app shadows the image's pruned node_modules,
# so the dev command runs the workspace via pnpm/tsx from the mounted source. This
# is intentionally dev-only; prod uses the immutable built image.
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      target: build
    # Run from mounted source with live reload during development.
    command: ["pnpm", "--filter", "@obikai/api", "dev"]
    volumes:
      - ./:/repo
      - /repo/node_modules
    working_dir: /repo
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  worker:
    build:
      target: build
    command: ["pnpm", "--filter", "@obikai/worker", "dev"]
    volumes:
      - ./:/repo
      - /repo/node_modules
    working_dir: /repo
    environment:
      NODE_ENV: development

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  # ── `local` profile: bundled S3 + SMTP sandboxes ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: obikai-minio
    profiles: ["local"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - minio-data:/data

  # One-shot job that creates the default bucket once MinIO is healthy, then exits.
  createbuckets:
    image: minio/mc:latest
    container_name: obikai-createbuckets
    profiles: ["local"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/obikai &&
      mc anonymous set none local/obikai
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: obikai-mailpit
    profiles: ["local"]
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio-data:
