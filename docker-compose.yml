# ─────────────────────────────────────────────────────────────────────────────
# Obikai — base compose (ADR-0002/0009). Defines the four mandatory services for a
# self-host bring-up: api, worker, mongo, redis. All configuration is env-driven
# from .env (copy .env.example → .env); no secrets live in this file.
#
# Three-file split (matching the Glosan reference, improved per the plan):
#   docker-compose.yml            ← this base (services, healthchecks, limits)
#   docker-compose.override.yml   ← auto-loaded for LOCAL DEV (bind mounts, ports,
#                                   `local` profile adds minio + mailpit)
#   docker-compose.prod.yml       ← self-host/hosted: pulls ghcr.io images, joins
#                                   the external `web` network, adds Traefik labels
#
# Container names are prefixed `obikai-` (Glosan convention). Every long-running
# service: restart unless-stopped, a healthcheck, a memory limit, runs non-root,
# named volumes for state. The `worker` service processes ALL scheduled/background jobs
# (recurring billing, dunning, reminders) and is REQUIRED — `docker compose up` starts it
# alongside the api. (Hosting the worker inside the api process is not yet implemented.)
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    image: obikai-api
    container_name: obikai-api
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: api
    env_file: .env
    restart: unless-stopped
    # Non-root: the runtime stage's `node` user (uid 1000).
    user: "1000:1000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Node-native HTTP probe of /healthz (no curl/wget in slim; Node 22 has global fetch).
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  worker:
    image: obikai-worker
    container_name: obikai-worker
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: worker
    env_file: .env
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The worker has no HTTP server; a process-liveness check is sufficient here.
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  mongo:
    image: mongo:7
    container_name: obikai-mongo
    restart: unless-stopped
    # mongo:7 drops to the `mongodb` user (uid 999) internally; pin it explicitly.
    user: "999:999"
    # Authentication is ON: providing root credentials makes the image start mongod with `--auth`, so
    # the database is never reachable unauthenticated (G2). These are REQUIRED (`:?` fails fast if unset);
    # MONGO_URI must embed the SAME credentials with `authSource=admin`. NOTE: the root user is created
    # only on FIRST init of an empty data volume — enabling this on an existing unauthenticated volume
    # needs a one-time manual user creation (see docs/self-host.md).
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?set MONGO_ROOT_USER in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set MONGO_ROOT_PASSWORD in .env}
    healthcheck:
      # `ping` is allowed pre-auth even with --auth on, so the probe needs no credentials.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          memory: 1G
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7
    container_name: obikai-redis
    restart: unless-stopped
    user: "999:999"
    # Password-protected (G2): REQUIRED (`:?`), and REDIS_URL must embed the same password. The
    # healthcheck authenticates with it (a bare `redis-cli ping` returns NOAUTH once requirepass is set).
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command:
      ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

volumes:
  mongo-data:
  redis-data:
